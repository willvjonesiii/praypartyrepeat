<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 68" width="11" height="18">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fffd4"/>
      <stop offset="25%" stop-color="#2ecc71"/>
      <stop offset="60%" stop-color="#1a7a42"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="leftface" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(180,255,210,0.45)"/>
      <stop offset="100%" stop-color="rgba(100,200,140,0.05)"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="40%" stop-color="rgba(180,255,200,0.6)"/>
      <stop offset="100%" stop-color="rgba(100,200,140,0.05)"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(220,255,230,0.95)"/>
      <stop offset="100%" stop-color="rgba(60,200,100,0.7)"/>
    </linearGradient>
  </defs>
  <!-- Rotate -15deg around crystal center, then shift into viewBox -->
  <g transform="translate(8,4) rotate(-15, 16, 29)">
    <polygon points="16,14 27,20 27,52 16,58 5,52 5,20" fill="url(#body)"/>
    <polygon points="5,20 16,14 16,58 5,52" fill="url(#leftface)"/>
    <polygon points="27,20 16,14 16,58 27,52" fill="rgba(0,20,10,0.3)"/>
    <polygon points="16,0 24,15 8,15" fill="url(#tip)"/>
    <polygon points="16,0 8,15 16,14" fill="rgba(200,255,220,0.6)"/>
    <rect x="13.5" y="6" width="5" height="48" rx="2.5" fill="url(#center)" opacity="0.55"/>
    <ellipse cx="16" cy="36" rx="4" ry="12" fill="rgba(0,255,120,0.18)"/>
    <circle cx="16" cy="1.5" r="1.8" fill="rgba(255,255,255,0.95)"/>
    <ellipse cx="16" cy="56" rx="7" ry="2.5" fill="rgba(80,220,130,0.35)"/>
